<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 346" font-family="'Microsoft YaHei','PingFang SC','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8faff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#eef2ff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a56db"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="stage" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>

    <linearGradient id="footerBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#eff6ff"/>
    </linearGradient>

    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowSm" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <clipPath id="round-corner">
      <rect width="960" height="346" rx="16"/>
    </clipPath>
  </defs>

  <rect width="960" height="346" rx="16" fill="url(#bg)"/>

  <rect x="0" y="0" width="960" height="52" fill="url(#header)" clip-path="url(#round-corner)"/>

  <g transform="translate(340, 26)">
    <circle cx="0" cy="0" r="11" fill="none" stroke="#93c5fd" stroke-width="2"/>
    <polygon points="3,-9 -5,1 1,1 -3,9 5,-1 -1,-1" fill="#ffffff" stroke="#ffffff" stroke-width="1" stroke-linejoin="round"/>
  </g>

  <text x="366" y="34" text-anchor="start" fill="white" font-size="18" font-weight="bold">昇腾 AI 训练开发工具链全景图</text>

  <line x1="232" y1="72" x2="232" y2="292" stroke="#cbd5e1" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="480" y1="72" x2="480" y2="292" stroke="#cbd5e1" stroke-width="1" stroke-opacity="0.5"/>

  <rect x="16" y="72" width="208" height="36" rx="8" fill="url(#stage)" filter="url(#shadow)"/>
  <text x="120" y="96" text-anchor="middle" fill="white" font-size="14" font-weight="bold">分析迁移</text>

  <rect x="20" y="120" width="200" height="172" rx="8" fill="white" filter="url(#shadowSm)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="120" y="186" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">msTransplant</text>
  <text x="120" y="206" text-anchor="middle" fill="#64748b" font-size="11">GPU PyTorch 训练脚本</text>
  <text x="120" y="224" text-anchor="middle" fill="#64748b" font-size="11">一键迁移至昇腾 NPU</text>

  <rect x="240" y="72" width="232" height="36" rx="8" fill="url(#stage)" filter="url(#shadow)"/>
  <text x="356" y="96" text-anchor="middle" fill="white" font-size="14" font-weight="bold">精度调试</text>

  <rect x="244" y="120" width="224" height="82" rx="8" fill="white" filter="url(#shadowSm)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="356" y="152" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">msProbe</text>
  <text x="356" y="170" text-anchor="middle" fill="#64748b" font-size="11">全场景精度工具</text>
  <text x="356" y="186" text-anchor="middle" fill="#64748b" font-size="11">训练精度调试与问题定位</text>

  <rect x="244" y="210" width="224" height="82" rx="8" fill="white" filter="url(#shadowSm)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="356" y="242" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">TensorBoard</text>
  <text x="356" y="260" text-anchor="middle" fill="#64748b" font-size="11">分级展示模型结构与精度</text>
  <text x="356" y="276" text-anchor="middle" fill="#64748b" font-size="11">标杆模型对比</text>

  <rect x="488" y="72" width="456" height="36" rx="8" fill="url(#stage)" filter="url(#shadow)"/>
  <text x="716" y="96" text-anchor="middle" fill="white" font-size="14" font-weight="bold">性能调优 &amp; 监控</text>

  <rect x="492" y="120" width="144" height="52" rx="8" fill="white" filter="url(#shadowSm)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="564" y="142" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">msProf</text>
  <text x="564" y="160" text-anchor="middle" fill="#64748b" font-size="11">采集 CANN 与 NPU 数据</text>

  <rect x="644" y="120" width="144" height="52" rx="8" fill="white" filter="url(#shadowSm)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="716" y="142" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">msprof-analyze</text>
  <text x="716" y="160" text-anchor="middle" fill="#64748b" font-size="11">快速识别性能瓶颈</text>

  <rect x="796" y="120" width="144" height="52" rx="8" fill="white" filter="url(#shadowSm)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="868" y="142" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">msInsight</text>
  <text x="868" y="160" text-anchor="middle" fill="#64748b" font-size="11">可视化性能分析</text>

  <rect x="492" y="180" width="144" height="52" rx="8" fill="white" filter="url(#shadowSm)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="564" y="202" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">msMemScope</text>
  <text x="564" y="220" text-anchor="middle" fill="#64748b" font-size="11">内存采集与自动诊断</text>

  <rect x="644" y="180" width="144" height="52" rx="8" fill="white" filter="url(#shadowSm)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="716" y="202" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">Tinker</text>
  <text x="716" y="220" text-anchor="middle" fill="#64748b" font-size="11">并行策略自动寻优</text>

  <rect x="796" y="180" width="144" height="52" rx="8" fill="white" filter="url(#shadowSm)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="868" y="202" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">bind_core</text>
  <text x="868" y="220" text-anchor="middle" fill="#64748b" font-size="11">CPU 亲和性绑核</text>

  <rect x="492" y="240" width="144" height="52" rx="8" fill="white" filter="url(#shadowSm)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="564" y="262" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">msPTI</text>
  <text x="564" y="280" text-anchor="middle" fill="#64748b" font-size="11">面向 Profiling API</text>

  <rect x="644" y="240" width="296" height="52" rx="8" fill="white" filter="url(#shadowSm)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="792" y="258" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">msMonitor</text>
  <text x="792" y="274" text-anchor="middle" fill="#64748b" font-size="11">一站式监控，支持落盘与在线采集</text>
  <text x="792" y="288" text-anchor="middle" fill="#64748b" font-size="11">面向集群监测与定位</text>

  <rect x="16" y="302" width="928" height="36" rx="10" fill="url(#footerBg)" filter="url(#shadow)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="360" y="325" text-anchor="end" fill="#1e40af" font-size="14" font-weight="bold">面向昇腾 NPU</text>
  <circle cx="375" cy="320" r="2.5" fill="#94a3b8"/>
  <text x="480" y="325" text-anchor="middle" fill="#1e40af" font-size="14" font-weight="bold">聚焦高精度高性能的训练开发</text>
  <circle cx="584" cy="320" r="2.5" fill="#94a3b8"/>
  <text x="597" y="325" text-anchor="start" fill="#1e40af" font-size="14" font-weight="bold">工具链覆盖训练开发全生命周期</text>
</svg>
